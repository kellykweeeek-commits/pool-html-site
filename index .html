<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Bike Pool Simulator</title>
  <style>
    :root {
      --paper: #f0f8ff;
      --ink: #1e3f54;
      --muted: #5c7888;
      --blue: #5ba8d4;
      --blue-soft: #d0e8f5;
      --panel: #ffffff;
      --line: #c5ddea;
      --button: #2f7fae;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: min(680px, 100%);
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(135, 178, 202, 0.5);
      border-radius: 8px;
      overflow: hidden;
    }

    .topbar,
    .logbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 40px;
      padding: 8px 12px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      gap: 10px;
    }

    .topbar strong {
      font-size: 13px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      white-space: nowrap;
    }

    .stat {
      padding: 3px 7px;
      border: 1px solid #d6e7f0;
      border-radius: 999px;
      background: #f8fcff;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 156px;
      gap: 10px;
      padding: 10px;
    }

    .canvas-wrap {
      min-width: 0;
      align-self: start;
      border: 1px solid #c6deeb;
      border-radius: 8px;
      background: #e9f6fc;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 5 / 3;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
      align-self: start;
    }

    .module {
      background: var(--panel);
      border: 1px solid #d5e7f0;
      border-radius: 8px;
      padding: 8px;
    }

    .wheel {
      display: grid;
      place-items: center;
      padding-top: 2px;
      user-select: none;
      touch-action: none;
    }

    .wheel svg {
      width: 78px;
      height: 78px;
      cursor: grab;
    }

    .wheel svg:active { cursor: grabbing; }

    .sliders {
      display: grid;
      gap: 7px;
      margin-top: 6px;
    }

    label {
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--button);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    button {
      min-height: 30px;
      padding: 6px 7px;
      border: 1px solid #236f9a;
      border-radius: 7px;
      background: var(--button);
      color: white;
      font: inherit;
      font-size: 11px;
      cursor: pointer;
    }

    button.secondary {
      background: #ffffff;
      color: #236f9a;
      border-color: #a9d0e4;
    }

    button:active { transform: translateY(1px); }

    .legend {
      display: grid;
      gap: 5px;
      font-size: 10px;
      color: var(--muted);
    }

    .legend-row {
      display: grid;
      grid-template-columns: 22px 1fr;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .dot,
    .swatch {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1px solid rgba(30, 63, 84, 0.16);
    }

    .swatch {
      border-radius: 3px;
      background: repeating-linear-gradient(90deg, #2f91c9 0 5px, #74bee0 5px 10px, #ffffff 10px 18px, #74bee0 18px 23px);
    }

    canvas.duck-icon {
      display: block;
      width: 22px;
      height: 22px;
    }

    .swim-ring-icon {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: repeating-conic-gradient(#7ec8e3 0deg 90deg, #e8f7fc 90deg 180deg) 0 0 / 100% 100%;
      border: 2px solid rgba(30,63,84,0.15);
    }

    .logbar {
      justify-content: flex-start;
      border-top: 1px solid var(--line);
      border-bottom: none;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    @media (max-width: 620px) {
      body { padding: 10px; }
      .shell { grid-template-columns: 1fr; }
      .panel { grid-template-columns: 1fr 1fr; display: grid; }
      .module:first-child { grid-column: 1 / -1; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .stats { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Campus bike pool simulator">
    <div class="topbar">
      <strong>Campus Bike Pool</strong>
      <div class="stats">
        <span class="stat" id="waterStat">In 3.0 / Out 3.0</span>
        <span class="stat" id="duckStat">Ducks 0</span>
      </div>
    </div>

    <section class="shell">
      <div class="canvas-wrap">
        <canvas id="pool" width="900" height="540"></canvas>
      </div>

      <aside class="panel">
        <div class="module">
          <div class="wheel">
            <svg id="valve" viewBox="0 0 72 72" role="img" aria-label="Valve control">
              <defs>
                <filter id="roughen">
                  <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" result="noise" />
                  <feComposite in="SourceGraphic" in2="noise" operator="arithmetic" k1="0" k2="1" k3="0.04" k4="0" />
                </filter>
              </defs>
              <circle cx="36" cy="36" r="30" fill="#dfe8ec" stroke="#758893" stroke-width="5" filter="url(#roughen)" />
              <circle cx="36" cy="36" r="24" fill="#f9fcfd" stroke="#a8b8c0" stroke-width="4" />
              <g id="spokes" transform="rotate(0 36 36)">
                <rect x="33" y="8" width="6" height="56" rx="3" fill="#aebcc3" />
                <rect x="8" y="33" width="56" height="6" rx="3" fill="#aebcc3" />
                <rect x="33" y="8" width="6" height="56" rx="3" fill="#cad4d9" transform="rotate(45 36 36)" />
                <rect x="8" y="33" width="56" height="6" rx="3" fill="#cad4d9" transform="rotate(45 36 36)" />
              </g>
              <circle cx="36" cy="36" r="10" fill="#82939d" stroke="#52636d" stroke-width="3" />
              <circle cx="38" cy="33" r="6" fill="#dbe4e8" />
              <circle cx="41" cy="30" r="3" fill="#ffffff" />
            </svg>
          </div>
          <div class="sliders">
            <label>Inflow <input id="inflow" type="range" min="0" max="10" step="0.1" value="3" /></label>
            <label>Outflow <input id="outflow" type="range" min="0" max="10" step="0.1" value="3" /></label>
          </div>
        </div>

        <div class="module buttons">
          <button id="toggle">Pause</button>
          <button id="shared">+ Shared</button>
          <button id="private">+ Private</button>
          <button class="secondary" id="clear">Clear</button>
        </div>

        <div class="module legend" aria-label="Duck legend">
          <div class="legend-row"><canvas class="duck-icon" width="22" height="22" data-body="#f5c842" data-bill="#e05c00"></canvas><span>Meituan</span></div>
          <div class="legend-row"><canvas class="duck-icon" width="22" height="22" data-body="#52b96a" data-bill="#ff9800"></canvas><span>Qingju</span></div>
          <div class="legend-row"><canvas class="duck-icon" width="22" height="22" data-body="#4a90d9" data-bill="#e05c00"></canvas><span>Alipay</span></div>
          <div class="legend-row"><canvas class="duck-icon" width="22" height="22" data-body="#2c2c2c" data-bill="#e05c00"></canvas><span>Private B</span></div>
          <div class="legend-row"><canvas class="duck-icon" width="22" height="22" data-body="#8d6e63" data-bill="#ff9800"></canvas><span>Private R</span></div>
        </div>

        <div class="module legend" aria-label="Obstacle legend">
          <div class="legend-row"><span class="swatch" style="background:#7a8a96"></span><span>Fence</span></div>
          <div class="legend-row"><span class="swatch"></span><span>Lane divider</span></div>
          <div class="legend-row"><span class="swim-ring-icon"></span><span>Swim Ring</span></div>
        </div>
      </aside>
    </section>

    <div class="logbar" id="log">Ready. Drag the valve or click the water surface.</div>
  </main>

      { kind: "ring", img: "ring", x: 406, y: 178, homeX: 406, homeY: 178, vx: 0, vy: 0, w: 78, h: 78, r: 40, power: 1, label: "Notice" },
      { kind: "ring", img: "ring", x: 248, y: 378, homeX: 248, homeY: 378, vx: 0, vy: 0, w: 82, h: 82, r: 42, power: 1, label: "Notice" },
      { kind: "ring", img: "ring", x: 410, y: 348, homeX: 410, homeY: 348, vx: 0, vy: 0, w: 88, h: 88, r: 45, power: 1, label: "Notice" },
      { kind: "line", x: 120, y: 255, w: 665, h: 26, power: 2 },
      { kind: "line", x: 120, y: 328, w: 665, h: 26, power: 2 }
    ];

    function roundedRectPath(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.lineTo(x + w - r, y);
      c.quadraticCurveTo(x + w, y, x + w, y + r);
      c.lineTo(x + w, y + h - r);
      c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      c.lineTo(x + r, y + h);
      c.quadraticCurveTo(x, y + h, x, y + h - r);
      c.lineTo(x, y + r);
      c.quadraticCurveTo(x, y, x + r, y);
      c.closePath();
    }

    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    function removeWhite(img) {
      if (!img) return null;
      const c = document.createElement("canvas");
      c.width = img.naturalWidth;
      c.height = img.naturalHeight;
      const g = c.getContext("2d", { willReadFrequently: true });
      g.drawImage(img, 0, 0);
      const data = g.getImageData(0, 0, c.width, c.height);
      for (let i = 0; i < data.data.length; i += 4) {
        const r = data.data[i], gg = data.data[i + 1], b = data.data[i + 2];
        const light = (r + gg + b) / 3;
        if (light > 238 && Math.abs(r - gg) < 22 && Math.abs(gg - b) < 22) {
          data.data[i + 3] = Math.max(0, (255 - light) * 5);
        }
      }
      g.putImageData(data, 0, 0);
      return c;
    }

    async function prepareAssets() {
      for (const [key, src] of Object.entries(ASSETS)) {
        const img = await loadImage(src);
        images[key] = key === "pool" ? img : removeWhite(img);
      }
    }

    function waterLine() {
      return waterBounds.y + waterBounds.h * (1 - waterLevel / 100);
    }

    function obstacleVisibility(o) {
      return 1;
    }

    function setLog(text) {
      logEl.textContent = text;
    }

    function randPointInWater() {
      const yMin = clamp(waterLine() + 24, waterBounds.y + 24, waterBounds.y + waterBounds.h - 28);
      return {
        x: rng(waterBounds.x + 30, waterBounds.x + waterBounds.w - 30),
        y: rng(yMin, waterBounds.y + waterBounds.h - 26)
      };
    }

    function spawnDuck(typeIndex = Math.floor(Math.random() * duckTypes.length), quiet = false, options = {}) {
      const p = options.fromInlet ? { x: inlet.x, y: inlet.y + rng(-24, 24) } : randPointInWater();
      const type = duckTypes[typeIndex];
      const scale = rng(0.74, 1.05);
      ducks.push({
        x: p.x,
        y: p.y,
        vx: options.fromInlet ? rng(40, 78) : rng(-22, 22),
        vy: options.fromInlet ? rng(-34, 34) : rng(-12, 12),
        bob: rng(0, Math.PI * 2),
        size: 34 * scale,
        type,
        facing: options.fromInlet ? 1 : (Math.random() < 0.5 ? -1 : 1),
        imgKey: type.source,
        exiting: false
      });
      if (!quiet) setLog(`${type.name} bike entered the pool`);
    }

    function updateBikeFlow(dt) {
      const inflow = Number(inflowEl.value);
      const outflow = Number(outflowEl.value);
      spawnCarry += inflow * 0.46 * dt;
      while (spawnCarry >= 1 && ducks.length < 70) {
        spawnDuck(Math.random() < 0.75 ? Math.floor(Math.random() * 3) : 3 + Math.floor(Math.random() * 2), true, { fromInlet: true });
        spawnCarry -= 1;
      }

      exitCarry += outflow * 0.42 * dt;
      while (exitCarry >= 1) {
        const candidate = ducks
          .filter((d) => !d.exiting)
          .sort((a, b) => (b.x - a.x) + Math.abs(a.y - outlet.y) * -0.2)[0];
        if (candidate) candidate.exiting = true;
        exitCarry -= 1;
      }
    }

    function drawPoolBase() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#f8fbfd";
      ctx.fillRect(0, 0, W, H);
      if (images.pool) {
        ctx.drawImage(images.pool, 0, 0, W, H);
      } else {
        roundedRectPath(ctx, poolClip.x, poolClip.y, poolClip.w, poolClip.h, poolClip.r);
        ctx.fillStyle = "#ffffff";
        ctx.fill();
        roundedRectPath(ctx, waterBounds.x - 35, waterBounds.y - 40, waterBounds.w + 70, waterBounds.h + 80, 42);
        ctx.fillStyle = "#5ba8d4";
        ctx.fill();
      }
    }

    function drawDynamicWater(t) {
      const line = waterLine();
      ctx.save();
      roundedRectPath(ctx, waterBounds.x, waterBounds.y, waterBounds.w, waterBounds.h, waterBounds.r);
      ctx.clip();

      ctx.fillStyle = "rgba(31, 71, 91, 0.38)";
      ctx.fillRect(waterBounds.x, waterBounds.y, waterBounds.w, Math.max(0, line - waterBounds.y));

      ctx.fillStyle = "rgba(91, 168, 212, 0.24)";
      ctx.fillRect(waterBounds.x, line, waterBounds.w, waterBounds.y + waterBounds.h - line);

      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        const y = line + 20 + i * 48;
        for (let x = waterBounds.x - 10; x <= waterBounds.x + waterBounds.w + 10; x += 12) {
          const yy = y + Math.sin((x * 0.025) + t * 0.0025 + i) * (3 + i * 0.25);
          if (x === waterBounds.x - 10) ctx.moveTo(x, yy);
          else ctx.lineTo(x, yy);
        }
        ctx.strokeStyle = `rgba(210, 245, 255, ${0.18 - i * 0.015})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255, 255, 255, 0.62)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(waterBounds.x, line);
      for (let x = waterBounds.x; x <= waterBounds.x + waterBounds.w; x += 10) {
        ctx.lineTo(x, line + Math.sin((x + t * 0.08) * 0.045) * 3);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawImageCentered(img, x, y, w, h, rotation = 0, alpha = 1) {
      if (!img) return false;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.drawImage(img, -w / 2, -h / 2, w, h);
      ctx.restore();
      return true;
    }

    function drawLaneDivider(o, vis) {
      ctx.save();
      ctx.globalAlpha = vis;
      roundedRectPath(ctx, o.x, o.y - o.h / 2, o.w, o.h, 11);
      ctx.clip();
      ctx.strokeStyle = "rgba(24, 93, 128, 0.24)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(o.x, o.y + 8);
      ctx.lineTo(o.x + o.w, o.y + 8);
      ctx.stroke();

      for (let x = o.x - 10, i = 0; x < o.x + o.w + 18; x += 13, i++) {
        const isLargeWhite = i % 8 === 0 || i % 8 === 1;
        const radius = isLargeWhite ? 10 : 7;
        ctx.fillStyle = isLargeWhite ? "rgba(255, 255, 255, 0.96)" : (i % 2 ? "#2f91c9" : "#74bee0");
        ctx.beginPath();
        ctx.ellipse(x, o.y, radius, radius * 0.78, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = isLargeWhite ? "rgba(126, 200, 227, 0.55)" : "rgba(31, 92, 124, 0.25)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawObstacles() {
      for (const o of obstacles) {
        const vis = obstacleVisibility(o);
        if (vis <= 0.02) continue;
        if (o.kind === "line") {
          drawLaneDivider(o, vis);
          continue;
        }
        if (o.kind === "ring") continue;
        ctx.save();
        ctx.globalAlpha = vis;
        if (!drawImageCentered(images[o.img], o.x, o.y, o.w, o.h, 0, vis)) {
          drawFallbackObstacle(o, vis);
        }
        ctx.restore();
      }
    }

    function drawFloatingRings(t) {
      for (const o of obstacles) {
        if (o.kind !== "ring") continue;
        const bob = Math.sin(t * 0.003 + o.homeX * 0.02) * 3;
        ctx.save();
        ctx.globalAlpha = 0.96;
        if (!drawImageCentered(images[o.img], o.x, o.y + bob, o.w, o.h, 0, 0.96)) {
          drawFallbackObstacle({ ...o, y: o.y + bob });
        }
        ctx.strokeStyle = "rgba(255, 255, 255, 0.54)";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.ellipse(o.x, o.y + bob + o.h * 0.28, o.w * 0.38, 5, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawFallbackObstacle(o) {
      if (o.kind === "ring") {
        ctx.lineWidth = 12;
        ctx.strokeStyle = "#7ec8e3";
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.r * 0.52, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 8;
        ctx.strokeStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.r * 0.35, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.fillStyle = "#7a8a96";
        ctx.beginPath();
        ctx.moveTo(o.x - o.w * 0.45, o.y + o.h * 0.2);
        ctx.lineTo(o.x - o.w * 0.22, o.y - o.h * 0.34);
        ctx.lineTo(o.x + o.w * 0.12, o.y - o.h * 0.42);
        ctx.lineTo(o.x + o.w * 0.45, o.y);
        ctx.lineTo(o.x + o.w * 0.35, o.y + o.h * 0.36);
        ctx.lineTo(o.x - o.w * 0.2, o.y + o.h * 0.38);
        ctx.closePath();
        ctx.fill();
      }
    }

    function drawDuck(d, t) {
      const bob = Math.sin(t * 0.004 + d.bob) * 4;
      const s = d.size;
      ctx.save();
      ctx.translate(d.x, d.y + bob);
      ctx.scale(d.facing, 1);

      // Shadow beneath duck
      ctx.fillStyle = "rgba(22, 66, 83, 0.18)";
      ctx.beginPath();
      ctx.ellipse(0, s * 0.52, s * 0.7, s * 0.12, 0, 0, Math.PI * 2);
      ctx.fill();

      // --- BODY (large oval, slightly wider than tall) ---
      ctx.fillStyle = d.type.body;
      ctx.beginPath();
      ctx.ellipse(0, s * 0.12, s * 0.72, s * 0.48, 0, 0, Math.PI * 2);
      ctx.fill();

      // Body underside darker shade (water line reflection)
      ctx.fillStyle = shade(d.type.body, -20);
      ctx.globalAlpha = 0.45;
      ctx.beginPath();
      ctx.ellipse(0, s * 0.32, s * 0.68, s * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Wing concave indentation on body (left side)
      // Outer wing arc
      ctx.fillStyle = d.type.body;
      ctx.beginPath();
      ctx.arc(-s * 0.38, s * 0.14, s * 0.32, 0.2, Math.PI - 0.2);
      ctx.fill();

      // Wing cavity (darker ellipse inset)
      ctx.fillStyle = shade(d.type.body, -28);
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.ellipse(-s * 0.28, s * 0.2, s * 0.28, s * 0.16, 0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // --- HEAD (round circle, sits atop body) ---
      ctx.fillStyle = d.type.body;
      ctx.beginPath();
      ctx.arc(s * 0.18, -s * 0.22, s * 0.36, 0, Math.PI * 2);
      ctx.fill();

      // Head highlight (subtle lighter area top-left)
      ctx.fillStyle = shade(d.type.body, 22);
      ctx.globalAlpha = 0.28;
      ctx.beginPath();
      ctx.ellipse(s * 0.06, -s * 0.36, s * 0.2, s * 0.09, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // --- BILL (orange wedge shape pointing right) ---
      ctx.fillStyle = d.type.bill;
      ctx.beginPath();
      ctx.moveTo(s * 0.48, -s * 0.18);       // base top
      ctx.quadraticCurveTo(s * 0.72, -s * 0.22, s * 0.8, -s * 0.15); // upper curve to tip
      ctx.quadraticCurveTo(s * 0.72, -s * 0.05, s * 0.48, -s * 0.04); // lower curve from tip
      ctx.closePath();
      ctx.fill();

      // Bill lower jaw shadow
      ctx.fillStyle = shade(d.type.bill, -18);
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(s * 0.49, -s * 0.1);
      ctx.quadraticCurveTo(s * 0.7, -s * 0.08, s * 0.8, -s * 0.15);
      ctx.quadraticCurveTo(s * 0.72, -s * 0.05, s * 0.49, -s * 0.04);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;

      // --- EYE ---
      const eyeX = s * 0.36;
      const eyeY = -s * 0.28;
      const eyeR = s * 0.065;
      // Eye black
      ctx.fillStyle = "#111111";
      ctx.beginPath();
      ctx.arc(eyeX, eyeY, eyeR, 0, Math.PI * 2);
      ctx.fill();
      // Eye white highlight
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(eyeX + eyeR * 0.28, eyeY - eyeR * 0.3, eyeR * 0.38, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function shade(hex, amount) {
      const num = parseInt(hex.slice(1), 16);
      const r = clamp((num >> 16) + amount, 0, 255);
      const g = clamp(((num >> 8) & 0xff) + amount, 0, 255);
      const b = clamp((num & 0xff) + amount, 0, 255);
      return `rgb(${r},${g},${b})`;
    }

    function drawRipples() {
      for (const r of ripples) {
        const alpha = clamp(1 - r.radius / r.max, 0, 1);
        ctx.strokeStyle = `rgba(37, 142, 203, ${alpha * 0.55})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function update(dt, t) {
      if (!paused) {
        updateBikeFlow(dt);
      }

      const line = waterLine();
      for (let i = ducks.length - 1; i >= 0; i--) {
        const d = ducks[i];
        if (d.exiting && d.x > outlet.x + 20) {
          ducks.splice(i, 1);
          continue;
        }
        if (!paused) {
          d.bob += dt * 2.4;
          d.vx += Math.sin(t * 0.001 + d.bob) * 0.7 * dt;
          d.vy += Math.cos(t * 0.0012 + d.bob) * 0.45 * dt;

          // Separation: push apart from nearby ducks to avoid clumping at the inlet
          let sepX = 0, sepY = 0;
          for (let j = 0; j < ducks.length; j++) {
            if (j === i) continue;
            const other = ducks[j];
            const dx = d.x - other.x;
            const dy = d.y - other.y;
            const distSq = dx * dx + dy * dy;
            const minDist = (d.size + other.size) * 0.62;
            if (distSq < minDist * minDist && distSq > 0.001) {
              const dist = Math.sqrt(distSq);
              const force = (minDist - dist) / minDist;
              sepX += (dx / dist) * force;
              sepY += (dy / dist) * force;
            }
          }
          d.vx += sepX * 70 * dt;
          d.vy += sepY * 70 * dt;

          if (d.exiting) {
            const dx = outlet.x - d.x;
            const dy = outlet.y - d.y;
            const dist = Math.hypot(dx, dy) || 1;
            const pull = 92 + Number(outflowEl.value) * 14;
            d.vx += (dx / dist) * pull * dt;
            d.vy += (dy / dist) * pull * dt;
          } else {
            d.vx += Number(inflowEl.value) * 1.4 * dt;
            applyObstacleForces(d, dt);
          }
          d.x += d.vx * dt;
          d.y += d.vy * dt;
          d.vx *= Math.pow(0.985, dt * 60);
          d.vy *= Math.pow(0.985, dt * 60);
          if (d.x < waterBounds.x + 18 || (!d.exiting && d.x > waterBounds.x + waterBounds.w - 18)) {
            d.vx *= -0.82;
            d.x = d.exiting ? Math.max(d.x, waterBounds.x + 18) : clamp(d.x, waterBounds.x + 18, waterBounds.x + waterBounds.w - 18);
            d.facing *= -1;
          }
          if (d.y < line + 18 || d.y > waterBounds.y + waterBounds.h - 18) {
            d.vy *= -0.82;
            d.y = clamp(d.y, line + 18, waterBounds.y + waterBounds.h - 18);
          }
          if (Math.abs(d.vx) > 4) d.facing = d.vx > 0 ? 1 : -1;
        }
      }

      for (let i = ripples.length - 1; i >= 0; i--) {
        if (!paused) ripples[i].radius += 86 * dt;
        if (ripples[i].radius > ripples[i].max) ripples.splice(i, 1);
      }
      if (!paused) updateFloatingRings(dt);
    }

    function updateFloatingRings(dt) {
      for (const o of obstacles) {
        if (o.kind !== "ring") continue;
        o.vx += (o.homeX - o.x) * 1.9 * dt;
        o.vy += (o.homeY - o.y) * 1.9 * dt;
        o.x += o.vx * dt;
        o.y += o.vy * dt;
        o.vx *= Math.pow(0.82, dt * 60);
        o.vy *= Math.pow(0.82, dt * 60);
        o.x = clamp(o.x, o.homeX - 8, o.homeX + 8);
        o.y = clamp(o.y, o.homeY - 6, o.homeY + 6);
      }
    }

    function applyObstacleForces(d, dt) {
      for (const o of obstacles) {
        const vis = obstacleVisibility(o);
        if (vis < 0.22) continue;
        if (o.kind === "line") {
          if (d.x > o.x && d.x < o.x + o.w && Math.abs(d.y - o.y) < o.h * 0.8) {
            d.vy += (d.y < o.y ? -1 : 1) * 70 * vis * dt;
            d.vx *= 0.94;
          }
          continue;
        }
        const dx = d.x - o.x;
        const dy = d.y - o.y;
        const dist = Math.hypot(dx, dy) || 1;
        const influence = o.r + d.size * 0.45;
        if (dist < influence) {
          if (o.kind === "ring") {
            const touch = (influence - dist) / influence;
            o.vx += (dx / dist) * touch * 14;
            o.vy += (dy / dist) * touch * 10;
            d.vx -= (dx / dist) * touch * 18 * dt;
            d.vy -= (dy / dist) * touch * 14 * dt;
            continue;
          }
          const force = ((influence - dist) / influence) * o.power * vis;
          d.vx += (dx / dist) * force * 130 * dt;
          d.vy += (dy / dist) * force * 130 * dt;
        }
      }
    }

    function render(t) {
      drawPoolBase();
      drawDynamicWater(t);
      ctx.drawImage(trace, 0, 0);
      drawObstacles();
      ducks.slice().sort((a, b) => a.y - b.y).forEach((d) => drawDuck(d, t));
      drawRipples();
      drawFloatingRings(t);
      drawFlowArrows();

      waterStat.textContent = `In ${Number(inflowEl.value).toFixed(1)} / Out ${Number(outflowEl.value).toFixed(1)}`;
      duckStat.textContent = `Ducks ${ducks.length}`;
    }

    function drawFlowArrows() {
      const inflow = Number(inflowEl.value);
      const outflow = Number(outflowEl.value);
      ctx.save();
      ctx.globalAlpha = 0.36 + Math.min(0.42, Math.max(inflow, outflow) * 0.045);
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      if (inflow > 0.05) {
        arrow(28, inlet.y, 96, inlet.y, "#2f91c9");
      }
      if (outflow > 0.05) {
        arrow(804, outlet.y, 872, outlet.y, "#2f91c9");
      }
      ctx.restore();
    }

    function arrow(x1, y1, x2, y2, color) {
      const a = Math.atan2(y2 - y1, x2 - x1);
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - Math.cos(a - 0.55) * 13, y2 - Math.sin(a - 0.55) * 13);
      ctx.lineTo(x2 - Math.cos(a + 0.55) * 13, y2 - Math.sin(a + 0.55) * 13);
      ctx.closePath();
      ctx.fill();
    }

    function disturb(x, y) {
      if (x < waterBounds.x || x > waterBounds.x + waterBounds.w || y < waterLine() || y > waterBounds.y + waterBounds.h) return;
      ripples.push({ x, y, radius: 4, max: 115 });
      tctx.save();
      tctx.fillStyle = "rgba(37, 142, 203, 0.42)";
      tctx.beginPath();
      tctx.arc(x, y, 4, 0, Math.PI * 2);
      tctx.fill();
      tctx.strokeStyle = "rgba(37, 142, 203, 0.16)";
      tctx.lineWidth = 2;
      tctx.beginPath();
      tctx.arc(x, y, 22, 0, Math.PI * 2);
      tctx.stroke();
      tctx.restore();

      for (const d of ducks) {
        const dx = d.x - x;
        const dy = d.y - y;
        const dist = Math.hypot(dx, dy) || 1;
        if (dist < 100) {
          const impulse = (1 - dist / 100) * 140;
          d.vx += (dx / dist) * impulse;
          d.vy += (dy / dist) * impulse;
        }
      }
      setLog(`Disturbance at ${Math.round(x)}, ${Math.round(y)}`);
    }

    function pointerToCanvas(ev) {
      const rect = canvas.getBoundingClientRect();
      const source = ev.touches ? ev.touches[0] : ev;
      return {
        x: (source.clientX - rect.left) * (canvas.width / rect.width),
        y: (source.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    canvas.addEventListener("pointerdown", (ev) => {
      const p = pointerToCanvas(ev);
      disturb(p.x, p.y);
    });

    let drag = null;
    valve.addEventListener("pointerdown", (ev) => {
      valve.setPointerCapture(ev.pointerId);
      drag = { y: ev.clientY, inflow: Number(inflowEl.value), outflow: Number(outflowEl.value), angle: valveAngle };
    });
    valve.addEventListener("pointermove", (ev) => {
      if (!drag) return;
      const dy = ev.clientY - drag.y;
      valveAngle = drag.angle + dy * 1.4;
      spokes.setAttribute("transform", `rotate(${valveAngle} 36 36)`);
      inflowEl.value = clamp(drag.inflow + Math.max(0, dy) / 12, 0, 10).toFixed(1);
      outflowEl.value = clamp(drag.outflow + Math.max(0, -dy) / 12, 0, 10).toFixed(1);
      setLog(dy >= 0 ? "Valve opened: more bikes enter from the left" : "Valve reversed: more bikes leave from the right");
    });
    valve.addEventListener("pointerup", () => { drag = null; });
    valve.addEventListener("pointercancel", () => { drag = null; });

    toggleBtn.addEventListener("click", () => {
      paused = !paused;
      toggleBtn.textContent = paused ? "Run" : "Pause";
      if (!paused) {
        for (let i = 0; i < 3; i++) spawnDuck(Math.floor(Math.random() * 3), true, { fromInlet: true });
        spawnDuck(3 + Math.floor(Math.random() * 2), true, { fromInlet: true });
        setLog("Simulation running — shared & private bikes flowing in");
      } else {
        setLog("Simulation paused");
      }
    });

    sharedBtn.addEventListener("click", () => {
      for (let i = 0; i < 3; i++) spawnDuck(Math.floor(Math.random() * 3), true, { fromInlet: true });
      setLog("Shared bikes entered from the left channel");
    });

    privateBtn.addEventListener("click", () => {
      spawnDuck(3 + Math.floor(Math.random() * 2), true, { fromInlet: true });
      setLog("Private bike entered from the left channel");
    });

    clearBtn.addEventListener("click", () => {
      tctx.clearRect(0, 0, trace.width, trace.height);
      setLog("Ripple traces cleared");
    });

    function loop(now) {
      const dt = Math.min(0.05, (now - last) / 1000 || 0);
      last = now;
      frame++;
      update(dt, now);
      render(now);
      requestAnimationFrame(loop);
    }

    prepareAssets().then(() => {
      for (let i = 0; i < 14; i++) spawnDuck(Math.floor(Math.random() * 3), true);
      requestAnimationFrame(loop);
    });

    // Draw mini ducks on legend canvases
    function drawLegendDuck(canvas, bodyColor, billColor) {
      const lctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;
      const s = W * 0.38;

      lctx.clearRect(0, 0, W, H);
      lctx.save();
      lctx.translate(W * 0.44, H * 0.56);

      // Body
      lctx.fillStyle = bodyColor;
      lctx.beginPath();
      lctx.ellipse(0, s * 0.12, s * 0.72, s * 0.48, 0, 0, Math.PI * 2);
      lctx.fill();

      // Body shadow
      lctx.fillStyle = shade(bodyColor, -20);
      lctx.globalAlpha = 0.4;
      lctx.beginPath();
      lctx.ellipse(0, s * 0.32, s * 0.68, s * 0.22, 0, 0, Math.PI * 2);
      lctx.fill();
      lctx.globalAlpha = 1;

      // Wing cavity
      lctx.fillStyle = shade(bodyColor, -28);
      lctx.globalAlpha = 0.6;
      lctx.beginPath();
      lctx.ellipse(-s * 0.28, s * 0.2, s * 0.28, s * 0.16, 0.15, 0, Math.PI * 2);
      lctx.fill();
      lctx.globalAlpha = 1;

      // Head
      lctx.fillStyle = bodyColor;
      lctx.beginPath();
      lctx.arc(s * 0.18, -s * 0.22, s * 0.36, 0, Math.PI * 2);
      lctx.fill();

      // Bill
      lctx.fillStyle = billColor;
      lctx.beginPath();
      lctx.moveTo(s * 0.48, -s * 0.18);
      lctx.quadraticCurveTo(s * 0.72, -s * 0.22, s * 0.8, -s * 0.15);
      lctx.quadraticCurveTo(s * 0.72, -s * 0.05, s * 0.48, -s * 0.04);
      lctx.closePath();
      lctx.fill();

      // Eye
      lctx.fillStyle = '#111111';
      lctx.beginPath();
      lctx.arc(s * 0.36, -s * 0.28, s * 0.065, 0, Math.PI * 2);
      lctx.fill();
      lctx.fillStyle = '#ffffff';
      lctx.beginPath();
      lctx.arc(s * 0.36 + s * 0.065 * 0.28, -s * 0.28 - s * 0.065 * 0.3, s * 0.065 * 0.38, 0, Math.PI * 2);
      lctx.fill();

      lctx.restore();
    }

    document.querySelectorAll('canvas.duck-icon').forEach(c => {
      drawLegendDuck(c, c.dataset.body, c.dataset.bill);
    });
  </script>
</body>
</html>
